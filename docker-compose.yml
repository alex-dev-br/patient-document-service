services:
    postgres:
        image: postgres:18
        container_name: meu-historico-saude-postgres
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - ${POSTGRES_PORT}:5432
        volumes:
            - postgres_data:/var/lib/postgresql
        deploy:
            resources:
                limits:
                    memory: 256M
        networks:
            - app_network
    postgres-nc:
        image: postgres:18
        container_name: nextcloud-postgres
        environment:
            POSTGRES_DB: ${NEXTCLOUD_DB}
            POSTGRES_USER: ${NEXTCLOUD_DB_USER}
            POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
        volumes:
            - postgres_nc_data:/var/lib/postgresql
        deploy:
            resources:
                limits:
                    memory: 256M
        networks:
            - app_network
    nextcloud:
        image: nextcloud:apache
        container_name: seguro_nextcloud
        security_opt:
            - no-new-privileges:true
        restart: unless-stopped
        volumes:
            - nc_dados:/var/www/html
        environment:
            - POSTGRES_HOST=postgres-nc
            - POSTGRES_DB=${NEXTCLOUD_DB}          # Aponta para o banco do Nextcloud
            - POSTGRES_USER=${NEXTCLOUD_DB_USER}
            - POSTGRES_PASSWORD=${NEXTCLOUD_DB_PASSWORD}
            - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_USER}
            - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_PASSWORD}
            - NEXTCLOUD_ENABLE_ENCRYPTION=1
            - NEXTCLOUD_ENCRYPTION_MODE=master
        ports:
            - "80:80"
        deploy:
            resources:
                limits:
                    memory: 256M
        depends_on:
            - postgres-nc
        networks:
            - app_network
networks:
    app_network:
        driver: bridge
volumes:
    postgres_data:
    postgres_nc_data:
    nc_dados: