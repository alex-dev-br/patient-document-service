services:
    postgres:
        image: postgres:18
        container_name: meu-historico-saude-postgres

        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

        ports:
            - "${POSTGRES_PORT}:5432"

        volumes:
            - postgres_data:/var/lib/postgresql

        deploy:
            resources:
                limits:
                    memory: 256M

        networks:
            - app_network

    postgres-nc:
        image: postgres:18
        container_name: nextcloud-postgres

        environment:
            POSTGRES_DB: ${NEXTCLOUD_DB}
            POSTGRES_USER: ${NEXTCLOUD_DB_USER}
            POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}

        volumes:
            - postgres_nc_data:/var/lib/postgresql

        deploy:
            resources:
                limits:
                    memory: 256M

        networks:
            - app_network

    nextcloud:
        image: nextcloud:apache
        container_name: seguro_nextcloud
        restart: unless-stopped

        security_opt:
            - no-new-privileges:true

        environment:
            POSTGRES_HOST: postgres-nc
            POSTGRES_DB: ${NEXTCLOUD_DB}
            POSTGRES_USER: ${NEXTCLOUD_DB_USER}
            POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
            NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_USER}
            NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_PASSWORD}
            NEXTCLOUD_ENABLE_ENCRYPTION: "1"
            NEXTCLOUD_ENCRYPTION_MODE: master

        ports:
            - "80:80"

        volumes:
            - nc_dados:/var/www/html

        depends_on:
            - postgres-nc

        deploy:
            resources:
                limits:
                    memory: 256M

        networks:
            - app_network

    kafka:
        image: apache/kafka:4.3.1
        container_name: meu-historico-saude-kafka

        ports:
            - "9092:9092"

        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller

            KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092

            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093

            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

        networks:
            - app_network

networks:
    app_network:
        driver: bridge

volumes:
    postgres_data:
    postgres_nc_data:
    nc_dados: