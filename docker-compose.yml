services:
    postgres:
        image: postgres:18
        container_name: meu-historico-saude-postgres

        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

        ports:
            - "${POSTGRES_PORT}:5432"

        volumes:
            - postgres_data:/var/lib/postgresql

        healthcheck:
            test:
                - CMD-SHELL
                - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
            interval: 5s
            timeout: 5s
            retries: 10

        deploy:
            resources:
                limits:
                    memory: 256M

        networks:
            - app_network

    postgres-nc:
        image: postgres:18
        container_name: nextcloud-postgres

        environment:
            POSTGRES_DB: ${NEXTCLOUD_DB}
            POSTGRES_USER: ${NEXTCLOUD_DB_USER}
            POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}

        volumes:
            - postgres_nc_data:/var/lib/postgresql

        deploy:
            resources:
                limits:
                    memory: 256M

        networks:
            - app_network

    postgres-keycloak:
        image: postgres:18
        container_name: meu-historico-saude-keycloak-postgres
        restart: unless-stopped

        environment:
            POSTGRES_DB: ${KEYCLOAK_DB}
            POSTGRES_USER: ${KEYCLOAK_DB_USER}
            POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

        volumes:
            - keycloak_postgres_data:/var/lib/postgresql

        healthcheck:
            test:
                - CMD-SHELL
                - pg_isready -U ${KEYCLOAK_DB_USER} -d ${KEYCLOAK_DB}
            interval: 5s
            timeout: 5s
            retries: 10

        deploy:
            resources:
                limits:
                    memory: 256M

        networks:
            - app_network

    keycloak:
        image: quay.io/keycloak/keycloak:26.7.0
        container_name: meu-historico-saude-keycloak
        restart: unless-stopped

        command:
            - start-dev
            - --import-realm

        environment:
            KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
            KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}

            KC_DB: postgres
            KC_DB_URL_HOST: postgres-keycloak
            KC_DB_URL_DATABASE: ${KEYCLOAK_DB}
            KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
            KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}

            KC_HOSTNAME: http://localhost:8081
            KC_HEALTH_ENABLED: "true"

            AI_PROCESSING_CLIENT_SECRET: ${AI_PROCESSING_CLIENT_SECRET}
            PATIENT_DOCUMENT_DEV_CLIENT_SECRET: ${PATIENT_DOCUMENT_DEV_CLIENT_SECRET}

        ports:
            - "8081:8080"

        volumes:
            - ./docker/keycloak/meu-historico-saude-realm.json:/opt/keycloak/data/import/meu-historico-saude-realm.json:ro

        depends_on:
            postgres-keycloak:
                condition: service_healthy

        deploy:
            resources:
                limits:
                    memory: 768M

        networks:
            - app_network

    nextcloud:
        image: nextcloud:apache
        container_name: seguro_nextcloud
        restart: unless-stopped

        security_opt:
            - no-new-privileges:true

        environment:
            POSTGRES_HOST: postgres-nc
            POSTGRES_DB: ${NEXTCLOUD_DB}
            POSTGRES_USER: ${NEXTCLOUD_DB_USER}
            POSTGRES_PASSWORD: ${NEXTCLOUD_DB_PASSWORD}
            NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_USER}
            NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_PASSWORD}
            NEXTCLOUD_ENABLE_ENCRYPTION: "1"
            NEXTCLOUD_ENCRYPTION_MODE: master

            NEXTCLOUD_TRUSTED_DOMAINS: "nextcloud"

        ports:
            - "80:80"

        volumes:
            - nc_dados:/var/www/html

        depends_on:
            - postgres-nc

        deploy:
            resources:
                limits:
                    memory: 256M

        networks:
            - app_network

    patient-document-service:
        build:
            context: .
            dockerfile: Dockerfile

        image: patient-document-service:local
        container_name: meu-historico-saude-api
        restart: unless-stopped

        environment:
            POSTGRES_HOST: postgres
            POSTGRES_PORT: 5432
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

            KAFKA_BOOTSTRAP_SERVERS: kafka:29092
            KAFKA_ENABLED: "true"
            DOCUMENT_FILE_BASE_URL: http://patient-document-service:8080

            NEXTCLOUD_HOST: http://nextcloud
            NEXTCLOUD_USER: ${NEXTCLOUD_USER}
            NEXTCLOUD_PASSWORD: ${NEXTCLOUD_PASSWORD}

            IAM_ISSUER_URI: http://localhost:8081/realms/meu-historico-saude
            IAM_JWK_SET_URI: http://keycloak:8080/realms/meu-historico-saude/protocol/openid-connect/certs
            IAM_AUDIENCE: patient-document-api

        ports:
            - "8080:8080"

        depends_on:
            postgres:
                condition: service_healthy

            kafka:
                condition: service_started

            nextcloud:
                condition: service_started

            keycloak:
                condition: service_started

        deploy:
            resources:
                limits:
                    memory: 512M

        networks:
            - app_network

    kafka:
        image: apache/kafka:4.3.1
        container_name: meu-historico-saude-kafka

        ports:
            - "9092:9092"

        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: 'broker,controller'

            KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
            KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'

            KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
            KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'

            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

        networks:
            - app_network
    kafka-ui:
        image: provectuslabs/kafka-ui:latest
        container_name: ia-image-reader-kafka-ui
        restart: always
        ports:
            - "8181:8080"
        environment:
            KAFKA_CLUSTERS_0_NAME: local
            KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
        networks:
            - app_network
        depends_on:
            - kafka

networks:
    app_network:
        driver: bridge

volumes:
    postgres_data:
    postgres_nc_data:
    nc_dados:
    keycloak_postgres_data:
